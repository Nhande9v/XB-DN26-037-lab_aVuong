apiVersion: apps/v1
kind: Deployment
metadata:
  name: bad-replicas
  namespace: demo
spec:
  replicas: 6
  selector:
    matchLabels:
      app: bad-replicas
  template:
    metadata:
      labels:
        app: bad-replicas
        owner: platform-team
    spec:
      containers:
        - name: app
          image: nginx:1.27.0
          resources:
            limits:
              cpu: "100m"
              memory: "128Mi"
          securityContext:
            runAsUser: 1000