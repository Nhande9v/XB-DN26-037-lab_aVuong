# .github/workflows/validate.yml
name: validate

on:
  pull_request:
    paths:
      - 'app-api/**'
      - 'app-analysis/**'
      - 'app-alert/**'
      - 'app-common/**'
      - 'argocd/**'
      - 'rbac/**'          # Theo dõi thay đổi Lab 1.1
      - 'gatekeeper/**'    # Theo dõi thay đổi Lab Gatekeeper
      - 'eso/**'           # Theo dõi thay đổi Lab 2.1 (External Secrets)
      - 'signing/**'       # Theo dõi thay đổi Lab 2.2 (Chứa public key cấu hình)

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install kubeconform
        run: |
          curl -sSLo kc.tgz https://github.com/yannh/kubeconform/releases/download/v0.6.7/kubeconform-linux-amd64.tar.gz
          tar -xzf kc.tgz
          sudo mv kubeconform /usr/local/bin/

      - name: Validate manifests
        run: |
          # Thêm rbac/, eso/, gatekeeper/, signing/ vào chuỗi quét cú pháp tự động
          kubeconform -strict -summary -ignore-missing-schemas \
            app-api/ \
            app-analysis/ \
            app-alert/ \
            app-common/ \
            argocd/ \
            rbac/ \
            eso/ \
            gatekeeper/ \
            signing/